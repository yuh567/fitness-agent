name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      - run: flutter create . --project-name fitness_agent
      - run: |
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' android/app/build.gradle
      - run: flutter pub get
      - run: |
          echo "## Flutter Analyze" >> $GITHUB_STEP_SUMMARY
          flutter analyze --fatal-infos 2>&1 | tee analyze.log || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -100 analyze.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - run: |
          echo "## Flutter Build" >> $GITHUB_STEP_SUMMARY
          flutter build apk --release 2>&1 | tee build.log || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if grep -q "BUILD FAILED" build.log || grep -q "Compilation failed" build.log || grep -q "error" build.log; then
            echo "Build failed with errors"
            exit 1
          fi
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "APK not found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
